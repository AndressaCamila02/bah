<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Verificador de Idade</title>
    <meta charset="UTF-8">
</head>
<body>
    <h2>Cadastro de Usuário</h2>
    
    <form action="/verificar" method="post">
        <label>Nome:</label>
        <input type="text" name="nome" required>
        <br><br>
        <label>Idade:</label>
        <input type="number" name="idade" required>
        <br>Clica aqui para enviar<br>
        <button type="submit">Enviar</button>
    </form>

    <hr>

    <h3 th:if="${resultado}" th:text="${resultado}"></h3>

    <body>
    <script>
        let vet [2, 4, 3, 5, 4, 6, 3, 8];
        for (let pos in vet) {
        for (let pos = 0; pos < vet.length; pos++)
            //document.write("A posição" + pos + "tem o valor + vet [pos] + "!");
            document.write(`A posição ${pos} tem o valor ${vet[pos]}!<br>`);
        }
    </script>

</body>
</html>
